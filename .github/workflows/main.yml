name: Crank CI Workflow
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run lint

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build

  test:
    name: Test (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v2
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Install WebKit dependencies
        if: matrix.browser == 'webkit'
        run: bunx playwright install-deps webkit
      - name: Run core tests
        run: bun run test:core -- --browser ${{ matrix.browser }}
      - name: Run eslint plugin tests
        run: bun run test:eslint

  changes:
    name: Detect Changes
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      website: ${{ steps.check.outputs.website }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: check
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -qE '^(website|docs|examples)/|^package\.json$'; then
            echo "website=true" >> "$GITHUB_OUTPUT"
          else
            echo "website=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy Website
    needs: [lint, typecheck, build, test, changes]
    if: github.ref == 'refs/heads/main' && needs.changes.outputs.website == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun install
        working-directory: website
      - name: Install Bikeshed
        run: pipx install bikeshed && bikeshed update
      - name: Deploy website
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          bun run deploy
        working-directory: website
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
