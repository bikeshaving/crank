name: Release
on:
  push:
    tags:
      - "v*"

jobs:
  build-skill:
    name: Build Skill
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Build skill archive and directory
        run: npx @b9g/skillpack docs/SKILL.md -o skills/
      - name: Commit skill directory
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills/
          git diff --cached --quiet || git commit -m "Build skill directory for ${GITHUB_REF_NAME}"
          git push origin HEAD:main
      - name: Upload skill artifact
        uses: actions/upload-artifact@v4
        with:
          name: skill-archive
          path: skills/crank-component-authoring.skill

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: npm
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Publish @b9g/crank
        run: npm publish --provenance --access public
        working-directory: dist

  create-release:
    name: Create GitHub Release
    needs: [build-skill, publish-npm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download skill artifact
        uses: actions/download-artifact@v4
        with:
          name: skill-archive
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.skill
          generate_release_notes: true
